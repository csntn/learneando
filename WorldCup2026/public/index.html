<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predicciones Mundial 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b1120;
      --card: #15203a;
      --card2: #1b2747;
      --border: #2a3a5e;
      --text: #e8eefc;
      --muted: #8ea0c4;
      --accent: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
    }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #16213e 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }
    .wrap { max-width: 880px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 1.8rem; letter-spacing: -0.5px; }
    header p { color: var(--muted); margin-top: 0.4rem; font-size: 0.95rem; }

    .controls {
      display: flex; gap: 0.6rem; justify-content: center;
      flex-wrap: wrap; margin-bottom: 1.5rem;
    }
    input[type="date"] {
      padding: 0.7rem 1rem; border-radius: 0.7rem;
      border: 1px solid var(--border); background: var(--card);
      color: var(--text); font-size: 1rem;
    }
    button {
      padding: 0.7rem 1.6rem; border-radius: 0.7rem; border: none;
      background: var(--accent); color: white; font-size: 1rem;
      font-weight: 600; cursor: pointer; transition: 0.15s;
    }
    button:hover { background: #2563eb; transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #status { text-align: center; color: var(--muted); margin-bottom: 1.5rem; min-height: 1.2rem; }

    .grid { display: grid; gap: 1rem; grid-template-columns: 1fr; }
    @media (min-width: 620px) { .grid { grid-template-columns: 1fr 1fr; } }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 1rem; padding: 1.2rem; position: relative;
      overflow: hidden;
    }
    .card-top {
      height: 4px; position: absolute; top: 0; left: 0; right: 0;
    }
    .top-home { background: var(--green); }
    .top-away { background: var(--accent); }
    .top-draw { background: var(--yellow); }

    .round { font-size: 0.72rem; color: var(--muted); text-transform: uppercase;
             letter-spacing: 1px; margin-bottom: 0.8rem; }

    .matchup {
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.5rem; margin-bottom: 1rem;
    }
    .team { flex: 1; text-align: center; }
    .team .name { font-weight: 700; font-size: 1.05rem; }
    .team .rating { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .score {
      font-size: 1.7rem; font-weight: 800; padding: 0 0.6rem;
      white-space: nowrap;
    }

    .verdict {
      text-align: center; font-weight: 600; padding: 0.5rem;
      border-radius: 0.6rem; margin-bottom: 1rem; font-size: 0.95rem;
    }
    .v-home { background: rgba(34,197,94,0.15); color: var(--green); }
    .v-away { background: rgba(59,130,246,0.15); color: #93c5fd; }
    .v-draw { background: rgba(234,179,8,0.15); color: var(--yellow); }

    .probbar {
      display: flex; height: 8px; border-radius: 4px; overflow: hidden;
      margin-bottom: 0.4rem; background: var(--border);
    }
    .prob-home { background: var(--green); }
    .prob-away { background: var(--accent); }
    .prob-labels {
      display: flex; justify-content: space-between;
      font-size: 0.72rem; color: var(--muted); margin-bottom: 0.8rem;
    }

    .reason { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }

    .empty { text-align: center; color: var(--muted); padding: 3rem 1rem; }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 1rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>⚽ Predicciones Mundial 2026</h1>
      <p>Pronósticos basados en rating de fuerza de cada selección</p>
    </header>

    <div class="controls">
      <input type="date" id="dateInput" />
      <button id="loadBtn">Predecir</button>
    </div>

    <div id="status"></div>
    <div class="grid" id="results"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
